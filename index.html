<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Júlia ❤️</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* ==========================================
           CORES E UTILITÁRIOS CUSTOMIZADOS
           ========================================== */
        :root {
            --rose-500: #f43f5e;
            --rose-600: #e11d48;
            --pink-50: #fdf2f8;
            --pink-100: #fce7f3;
            --pink-200: #fbcfe8;
            --pink-800: #9d174d;
        }

        body {
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
            /* Gradiente: da esquerda (branco) para a direita (rosa) */
            background: linear-gradient(to right, #ffffff, var(--pink-200));
            background-attachment: fixed;
            min-height: 100vh;
        }

        /* Títulos com a fonte cursiva */
        .font-handwriting { font-family: 'Dancing Script', cursive; }
        
        .text-rose { color: var(--rose-500) !important; }
        .bg-rose-light { background-color: var(--pink-100) !important; }
        
        /* Containers e Bordas */
        .bg-glass {
            background-color: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(4px);
        }
        .rounded-3xl { border-radius: 1.5rem !important; }
        .shadow-2xl { box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25) !important; }
        
        /* Transições de Modal e Layout */
        .scale-95 { transform: scale(0.95); }
        .scale-100 { transform: scale(1); }
        .cursor-not-allowed { cursor: not-allowed !important; }
        .pe-none { pointer-events: none !important; }

        /* Filtro avermelhado/rosado MAIS SUAVE */
        .filter-reddish {
            /* filter: sepia(40%) hue-rotate(330deg) saturate(120%) brightness(0.98); */
            transition: filter 0.3s ease, scale 0.5s ease;
        }

        /* PADRONIZAÇÃO DOS BOTÕES */
        .btn-standard {
            min-height: 54px; /* Altura padronizada para todos os botões */
            width: fit-content !important; /* Largura rente ao conteúdo */
            max-width: 100%; /* Previne que passe da tela no mobile */
            padding: 10px 2.5rem !important; /* Espaçamento vertical e lateral (padding-x de 2.5rem) */
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            margin-left: auto; /* Centraliza em elementos flex/block */
            margin-right: auto;
        }

        /* Botões Customizados Específicos */
        .btn-gradient {
            background: linear-gradient(to right, #fb7185, #ec4899);
            color: white;
            border: none;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .btn-gradient:hover {
            background: linear-gradient(to right, #f43f5e, #db2777);
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.2);
        }
        .btn-quiz {
            background-color: var(--pink-50);
            color: var(--pink-800);
            border: 1px solid #fbcfe8;
            transition: all 0.2s;
        }
        .btn-quiz:hover { background-color: var(--pink-100); }
        .btn-quiz.wrong {
            background-color: var(--rose-500) !important;
            color: white !important;
            border-color: var(--rose-500) !important;
        }

        /* Borda decorativa para o feedback de erro */
        .error-border {
            border: 3px dashed var(--rose-400);
            border-radius: 1.5rem;
            padding: 1.5rem;
            background-color: rgba(255, 255, 255, 0.4);
        }

        /* Container padrão das telas */
        .screen {
            display: none;
            opacity: 0;
            transition: opacity 0.8s ease-in-out;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .screen.active {
            display: flex;
            opacity: 1;
            z-index: 10;
        }

        /* Animações Flutuantes e Fade padrão */
        .fade-in { animation: fadeIn 0.5s ease-in-out forwards; }
        .fade-out { animation: fadeOut 0.5s ease-in-out forwards; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeOut {
            from { opacity: 1; transform: translateY(0); }
            to { opacity: 0; transform: translateY(-10px); }
        }

        /* Animação Exclusiva para o Bilhete */
        @keyframes showBilhete {
            0% { opacity: 0; transform: translateY(15px) scale(0.95) rotate(-2deg); }
            100% { opacity: 1; transform: translateY(0) scale(1) rotate(0deg); }
        }
        @keyframes hideBilhete {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-15px) scale(0.95); }
        }
        .bilhete-show { animation: showBilhete 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
        .bilhete-hide { animation: hideBilhete 0.4s ease-in forwards; }

        /* Animação Suave para os Títulos */
        @keyframes smoothTitle {
            0% { opacity: 0; transform: translateY(25px); filter: blur(2px); }
            100% { opacity: 1; transform: translateY(0); filter: blur(0); }
        }
        .screen.active .animate-title {
            animation: smoothTitle 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            opacity: 0; 
        }

        /* Animações Extras para a Camada de Erro */
        @keyframes popErrorText {
            0% { transform: scale(0.5); opacity: 0; }
            50% { transform: scale(1.3); color: var(--rose-600); text-shadow: 0px 4px 15px rgba(225, 29, 72, 0.4); }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-pop-error {
            display: inline-block;
            animation: popErrorText 0.6s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        @keyframes wiggleRobot {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-20deg) scale(1.2); }
            50% { transform: rotate(20deg) scale(1.2); }
            75% { transform: rotate(-10deg) scale(1.1); }
        }
        .animate-wiggle-robot {
            display: inline-block;
            animation: wiggleRobot 0.6s ease-in-out forwards;
        }

        /* Cursor da Animação de Digitação */
        .type-span.typing-cursor::after {
            content: '|';
            animation: blink 0.8s step-end infinite;
            margin-left: 2px;
            color: inherit;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* Animação do Robozinho (Flutuação pura em translateY) */
        @keyframes floatBot {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }
        .animate-float-bot { animation: floatBot 3s ease-in-out infinite; }
        /* .animate-float-bot {
            transform: rotate(313deg) scale(4) !important;
            bottom: 30px !important;
    right: 30px !important;
        } */
        /* Animação de Erro (Shake) para o Quiz */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-5px); }
            40%, 80% { transform: translateX(5px); }
        }
        .animate-shake { animation: shake 0.4s ease-in-out; }

        /* Corações do Fundo (Ajustado para não acumular) */
        .floating-heart {
            position: absolute;
            top: 0;
            color: rgba(255, 182, 193, 0.4);
            animation: floatUp linear infinite;
            z-index: 0;
            pointer-events: none;
        }
        @keyframes floatUp {
            0% { transform: translateY(110vh) scale(0.5) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-30vh) scale(1.2) rotate(360deg); opacity: 0; }
        }

        /* Novo Mural Espalhado (Tela Toda) */
        .photo-wall {
            position: absolute;
            top: 0;
            left: 50%;
            width: 100%;
            max-width: 1400px;
            height: 100%;
            transform: translateX(-50%);
            z-index: 0;
        }

        .polaroid-scattered {
            position: absolute;
            background: white;
            padding: 8px 8px 24px 8px;
            box-shadow: 2px 8px 20px rgba(0, 0, 0, 0.15);
            border-radius: 2px;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), z-index 0s;
            transform-origin: center;
            width: 25vw;
            max-width: 150px;
            min-width: 90px;
            transform: scale(1.2);
        }

        @media (min-width: 768px) {
            .polaroid-scattered {
                padding: 10px 10px 30px 10px;
                width: 14vw;
                max-width: 180px;
            }
        }

        .polaroid-scattered img {
            width: 100%;
            height: auto;
            border-radius: 2px;
            aspect-ratio: 1/1;
            object-fit: cover;
        }

        .polaroid-scattered:hover {
            transform: scale(1.2) rotate(0deg) !important;
            z-index: 999 !important;
            box-shadow: 4px 15px 35px rgba(0, 0, 0, 0.3);
            cursor: pointer;
        }

        /* Estilo de Carta de Papel */
        .letter-style {
            background-color: #fffafb;
            background-image:
                linear-gradient(rgba(244, 114, 182, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(244, 114, 182, 0.1) 1px, transparent 1px);
            background-size: 20px 20px;
            box-shadow: 2px 4px 20px rgba(0, 0, 0, 0.15), inset 0 0 20px rgba(0, 0, 0, 0.03);
            border: 1px solid #fce7f3;
            border-radius: 4px;
        }

        img[src="gifs/amor.gif"] {
            transform: rotate(313deg) scale(4) !important;
            bottom: 30px !important;
    right: 30px !important;
        }

        #quiz-options .btn {
            min-width: 290px;
        }

        /* Uso da propriedade 'scale' nativa do CSS para evitar conflitos com a animação de float (translateY) */
        .robot-phase-intro { scale: 1.5 !important; }
        .robot-phase-clown { scale: 1.4 !important; }
        .robot-phase-quiz { scale: 1 !important; }
        .robot-phase-jar { scale: 1 !important; }
    </style>
</head>

            "Porque eu quero acordar todo dia do seu lado.",
            "Porque eu amo te segurar nos meus braços.",
            "Porque eu me perco no seu olhar toda vez.",
            "Porque você tem as melhores imitações",
            "Porque você me trata como ninguém nunca me tratou antes.",
            "Porque simplesmente era pra ser assim.",
            "Porque você é transparente comigo.",
            "Porque você é extremamente cheirosa",
            "Porque eu amo sua voz.",
            "Porque eu amo o binguelinho na sua orelha",
            "Porque eu amo o seu cabelo.",
            "Porque você é a mais bonita de todas (é a segunda vez que eu escrevo, mas quis reforçar).",
            "Porque eu amo você contando histórias.",   
            "Porque eu penso em você quando estou tendo um dia difícil.",
            "Porque eu amo beijar a sua testa.",
            "Porque eu amo o seu senso de humor.",
            "Porque de alguma forma assistir os piores filmes do universo com você é uma experiência maravilhosa.",
            "Porque eu amo quando você fala que me ama.",
            "Porque eu amo você cantando.",
            "Porque eu amo olhar nos seus olhos e ver a sua pupila dilatar. (esse ficou meio psicopata? desculpa kkkkkk)",
            "Porque eu amo seu vocabulário.",
            "Porque você é minha paz.",
            "Porque você é o Batman (sim, eu sei).",
            "Porque nós dividimos o mesmo neurônio.",
            "Porque nós temos os mesmos príncipios.",
            "Porque eu fico vendo as horas a todo momento só pra ver sua foto.",
            "Porque eu fico feliz quando vejo que tem mensagem sua no celular.",
            "Porque você é a resposta das minhas orações.",
            "Porque você é fofa quando finge que está emburrada.",
            "Porque você é fofa.",
            "Porque você é a melhor coisa que já me aconteceu.",
        ];

        let currentMessageIndex = -1;
        let drawClicks = 0; 

        // ==========================================
        // FUNÇÕES DO MÁQUINA DE ESCREVER
        // ==========================================
        function clearTypewriters() {
            typeTimeouts.forEach(t => clearTimeout(t));
            typeTimeouts = [];
            document.querySelectorAll('.type-span').forEach(el => {
                el.innerHTML = '';
                el.classList.remove('typing-cursor');
            });
        }

        function typeText(elementId, text, speed = 40, callback = null) {
            const el = document.getElementById(elementId);
            if(!el) return;
            el.innerHTML = "";
            el.classList.add('typing-cursor');
            let i = 0;

            function type() {
                if (i < text.length) {
                    el.innerHTML += text.charAt(i);
                    i++;
                    typeTimeouts.push(setTimeout(type, speed));
                } else {
                    el.classList.remove('typing-cursor');
                    if (callback) callback();
                }
            }
            type();
        }

        // ==========================================
        // CONTROLE DO ROBÔ E TELAS
        // ==========================================
        function changeRobotGif(gifName) {
            const robotImg = document.getElementById('robot-gif');
            if (!robotImg) return;
            
            robotImg.style.opacity = 0;
            
            setTimeout(() => {
                robotImg.src = `gifs/${gifName}`;
                robotImg.style.opacity = 1;
            }, 300);
        }

        function clearAllTimers() {
            quizTimers.forEach(t => clearTimeout(t));
            jarTimers.forEach(t => clearTimeout(t));
            quizTimers = [];
            jarTimers = [];
            clearTypewriters(); // Reseta os textos
        }

        function goToScreen(screenId) {
            clearAllTimers();
            
            const robotImg = document.getElementById('robot-gif');

            if (robotImg) {
                robotImg.classList.remove('robot-phase-intro', 'robot-phase-quiz', 'robot-phase-jar', 'robot-phase-clown');
            }
            
            if (screenId === 'screen-final') {
                const splitLayout = document.getElementById('split-layout');
                splitLayout.style.opacity = 0;
                
                setTimeout(() => {
                    splitLayout.classList.add('d-none');
                    document.getElementById('screen-final').classList.add('active');
                    typeText('type-final', texts.final, 30);
                }, 500);
                return;
            }

            document.querySelectorAll('.screen').forEach(el => {
                el.classList.remove('active');
            });

            setTimeout(() => {
                document.getElementById(screenId).classList.add('active');

                // Disparo de GIFs e Efeitos dependendo da tela
                if (screenId === 'screen-intro') {
                    if (robotImg) robotImg.classList.add('robot-phase-intro');
                    changeRobotGif('float.gif');
                    typeText('type-intro-1', texts.intro1, 30, () => {
                        typeText('type-intro-2', texts.intro2, 30);
                    });

                } else if (screenId === 'screen-quiz') {
                    if (robotImg) robotImg.classList.add('robot-phase-quiz');
                    changeRobotGif('pensativo.gif');
                    typeText('type-quiz', texts.quiz, 30);
                    
                    // Aumentado para 9 segundos antes de ficar nervoso
                    quizTimers.push(setTimeout(() => {
                        changeRobotGif('nervoso.gif');
                    }, 9000));
                    
                } else if (screenId === 'screen-jar') {
                    if (robotImg) robotImg.classList.add('robot-phase-jar');
                    changeRobotGif('anotacoes.gif');

                    // Aumentado para 12 segundos
                    jarTimers.push(setTimeout(() => {
                        changeRobotGif('cha.gif');
                    }, 12000));

                    // joia vai em 22 segundos para manter o intervalo anterior
                    jarTimers.push(setTimeout(() => {
                        changeRobotGif('joia.gif');
                    }, 22000));
                }
            }, 50);
        }

        // ==========================================
        // LÓGICA DO QUIZ NA MESMA TELA COM NOVO STATE E BORDA
        // ==========================================
        function handleWrongAnswer(btnElement) {
            clearAllTimers(); 
            changeRobotGif('palhaco.gif');

            const robotImg = document.getElementById('robot-gif');
            if (robotImg) {
                // Remove as outras classes de tamanho e aplica a do palhaço (scale: 1.4)
                robotImg.classList.remove('robot-phase-intro', 'robot-phase-quiz', 'robot-phase-jar');
                robotImg.classList.add('robot-phase-clown');
            }

            // Esconde as opções (estado default) e mostra o feedback
            const stateDefault = document.getElementById('quiz-state-default');
            const stateFeedback = document.getElementById('quiz-state-feedback');
            const btnFeedbackContinue = document.getElementById('btn-feedback-continue');

            stateDefault.classList.add('d-none');
            stateFeedback.classList.remove('d-none');
            
            btnFeedbackContinue.classList.add('opacity-0', 'pe-none');

            // Aciona o texto máquina de escrever no feedback
            typeText('type-feedback', texts.feedback, 30, () => {
                // Mostra o botão de continuar assim que terminar de digitar
                btnFeedbackContinue.classList.remove('opacity-0', 'pe-none');
            });
        }

        function closeFeedbackAndProceed() {
            goToScreen('screen-jar');
        }

        // ==========================================
        // POTE DE MOTIVOS (ANIMAÇÃO EXCLUSIVA DE PAPEL)
        // ==========================================
        function drawMessage() {
            const messageElement = document.getElementById('message-text');
            const drawButton = document.getElementById('btn-draw');
            const counterText = document.getElementById('click-counter-text');

            drawButton.disabled = true;
            
            // Aplica a animação de esconder o bilhete atual
            messageElement.classList.remove('bilhete-show');
            messageElement.classList.add('bilhete-hide');

            setTimeout(() => {
                let newIndex;
                if (messages.length > 1) {
                    do { newIndex = Math.floor(Math.random() * messages.length); }
                    while (newIndex === currentMessageIndex);
                } else {
                    newIndex = 0;
                }
                currentMessageIndex = newIndex;
                
                // Troca o texto do bilhete diretamente (sem digitação)
                messageElement.innerText = messages[currentMessageIndex];
                
                // Aplica a animação de mostrar o novo bilhete
                messageElement.classList.remove('bilhete-hide');
                messageElement.classList.add('bilhete-show');
                
                drawButton.disabled = false;

                // Lógica do Indicador
                drawClicks++;
                if (drawClicks < 5) {
                    counterText.innerText = `Continue puxando... (${drawClicks}/5)`;
                } else if (drawClicks === 5) {
                    document.getElementById('btn-prosseguir').classList.remove('d-none');
                    counterText.innerText = "Tem muitos mais motivos, mas você já pode prosseguir se quiser! 👀";
                }

            }, 400); // 400ms é o exato tempo da animação 'bilhete-hide'
        }

        // ==========================================
        // FLUXO DE EMOJIS DISTRIBUÍDO NO CARREGAMENTO
        // ==========================================
        function createFloatingHearts() {
            const container = document.getElementById('hearts-container');
            const heartIcons = ['♥', '♡', '💕', '💖', '✨', '🥰', '😍'];

            // 45 partículas
            for (let i = 0; i < 45; i++) {
                const heart = document.createElement('div');
                heart.classList.add('floating-heart');
                heart.innerText = heartIcons[Math.floor(Math.random() * heartIcons.length)];
                heart.style.left = `${Math.random() * 100}vw`;
                
                const size = Math.random() * 1.2 + 0.8;
                heart.style.fontSize = `${size}rem`;
                
                const duration = Math.random() * 8 + 6;
                heart.style.animationDuration = `${duration}s`;
                
                // Atraso negativo para distribuir os emojis aleatoriamente logo no load da tela
                const delay = Math.random() * 20;
                heart.style.animationDelay = `-${delay}s`;

                container.appendChild(heart);
            }
        }

        
        // Iniciar página
        window.onload = () => {
            createFloatingHearts();
            // Inicia o efeito digitação da primeira tela
            typeText('type-intro-1', texts.intro1, 30, () => {
                typeText('type-intro-2', texts.intro2, 30);
            });
        };
    </script>
